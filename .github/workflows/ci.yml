name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint and validate
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Check out repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up PHP
              uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
              with:
                  php-version: "8.2"
                  tools: composer:v2
                  coverage: none

            - name: Install Shopware CLI
              uses: shopware/shopware-cli-action@b67b48ccb52beb8533ea276152e1f89f29bbd080 # v3.0.0
              with:
                  version: 0.16.7

            - name: Validate Composer metadata
              run: composer validate --strict --no-check-version

            - name: Check PHP syntax
              run: find src tests -name '*.php' -print0 | xargs -0 -n1 php -l

            - name: Check extension formatting
              run: shopware-cli extension format --dry-run .

            - name: Validate lowest Shopware compatibility
              run: >-
                  shopware-cli extension validate
                  --full
                  --check-against lowest
                  --reporter github
                  .

            - name: Validate highest Shopware compatibility
              if: ${{ success() || failure() }}
              run: >-
                  shopware-cli extension validate
                  --full
                  --check-against highest
                  --reporter github
                  .

    phpunit:
        name: PHPUnit (Shopware ${{ matrix.shopware }}, PHP 8.4)
        strategy:
            fail-fast: false
            matrix:
                include:
                    - shopware: "6.6"
                      shopware_version: "v6.6.10.20"
                    - shopware: "6.7"
                      shopware_version: "v6.7.12.1"
        uses: shopware/github-actions/.github/workflows/phpunit.yml@7c398bdcf7f564f2885758094e11b3b6d8b9b699
        with:
            extensionName: LaioutrConnector
            shopwareVersion: ${{ matrix.shopware_version }}
            phpVersion: "8.4"
            mysqlVersion: mariadb:11.8
            filterName: LaioutrConnector
