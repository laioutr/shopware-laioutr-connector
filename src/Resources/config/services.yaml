services:
    _defaults:
        autowire: true

    Laioutr\Connector\Session\Storefront\Controller\ConnectController:
        public: true

    Laioutr\Connector\Session\Storefront\Controller\CookieRedirectController:
        public: true

    Laioutr\Connector\Session\StoreApi\Controller\SessionHandoffController:
        public: true

    Laioutr\Connector\Session\StoreApi\Controller\SessionAdoptController:
        public: true

    Laioutr\Connector\Session\Subscriber\AuthSubscriber:
        tags:
            - kernel.event_subscriber

    Laioutr\Connector\Session\Subscriber\RouteSubscriber:
        tags:
            - kernel.event_subscriber

    Laioutr\Connector\Session\Integration\SessionStorage: ~
    Laioutr\Connector\Session\Integration\CallbackRedirector: ~
    Laioutr\Connector\Session\Business\DomainWhitelistValidator: ~
    Laioutr\Connector\Session\Business\SessionHandoffCodeService: ~

    Laioutr\Connector\Session\Integration\SessionHandoffStore: ~

    Laioutr\Connector\Embedded\Business\RouteAllowlist: ~

    Laioutr\Connector\Embedded\Subscriber\LockdownSubscriber:
        tags:
            - kernel.event_subscriber
