# This file is managed by shopware-cli. Do not edit manually.
# Create a compose.override.yaml to customize services.
# See https://docs.docker.com/compose/how-tos/multiple-compose-files/merge/

services:
    web:
        image: ghcr.io/shopware/docker-dev:php8.5-node24-caddy
        ports:
            - 8000:8000
            - 8080:8080
            - 9999:9999
            - 9998:9998
            - 5173:5173
            - 5773:5773
        env_file:
            - .env.local
        environment:
            HOST: 0.0.0.0
            DATABASE_URL: mysql://root:root@database/shopware
            MAILER_DSN: smtp://mailer:1025
            TRUSTED_PROXIES: REMOTE_ADDR
            SYMFONY_TRUSTED_PROXIES: REMOTE_ADDR
        volumes:
            - .:/var/www/html
        depends_on:
            database:
                condition: service_healthy
    database:
        image: mariadb:11.8
        environment:
            MARIADB_DATABASE: shopware
            MARIADB_ROOT_PASSWORD: root
            MARIADB_USER: shopware
            MARIADB_PASSWORD: shopware
        volumes:
            - db-data:/var/lib/mysql:rw
        command:
            - --sql_mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
            - --log_bin_trust_function_creators=1
            - --binlog_cache_size=16M
            - --key_buffer_size=0
            - --join_buffer_size=1024M
            - --innodb_log_file_size=128M
            - --innodb_buffer_pool_size=1024M
            - --innodb_buffer_pool_instances=1
            - --group_concat_max_len=320000
            - --default-time-zone=+00:00
            - --max_binlog_size=512M
            - --binlog_expire_logs_seconds=86400
        healthcheck:
            test:
                - CMD
                - mariadb-admin
                - ping
                - -h
                - localhost
                - -proot
            start_period: 10s
            start_interval: 3s
            interval: 5s
            timeout: 1s
            retries: 10
    adminer:
        image: adminer
        stop_signal: SIGKILL
        depends_on:
            - database
        environment:
            ADMINER_DEFAULT_SERVER: database
        ports:
            - 9080:8080
    mailer:
        image: axllent/mailpit
        ports:
            - 1025:1025
            - 8025:8025
        environment:
            MP_SMTP_AUTH_ACCEPT_ANY: "1"
            MP_SMTP_AUTH_ALLOW_INSECURE: "1"
volumes:
    db-data:
